<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Surveillance Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .upload-section {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }

        .upload-btn {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.1em;
            transition: all 0.3s;
            border: none;
        }

        .upload-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        #fileInput {
            display: none;
        }

        .jobs-section {
            margin-top: 30px;
        }

        .job-card {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .job-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .job-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .job-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .status-badge {
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
        }

        .status-queued {
            background: #ffc107;
            color: white;
        }

        .status-processing {
            background: #17a2b8;
            color: white;
        }

        .status-completed {
            background: #28a745;
            color: white;
        }

        .status-failed {
            background: #dc3545;
            color: white;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e9ecef;
            border-radius: 15px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .job-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #764ba2;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .metric-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .metric-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .metric-label {
            color: #6c757d;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }

        .empty-state i {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎥 Video Surveillance Dashboard</h1>
            <p>Upload videos for automated detection, tracking & event recognition</p>
        </div>

        <div class="content">
            <div class="upload-section">
                <h2 style="margin-bottom: 20px;">Upload Video</h2>
                <input type="file" id="fileInput" accept="video/*">
                <label for="fileInput" class="upload-btn">
                    📤 Choose Video File
                </label>
                <p style="margin-top: 15px; color: #6c757d;">
                    Supported formats: MP4, AVI, MOV, MKV (Max 500MB)
                </p>
            </div>

            <div class="jobs-section">
                <h2 style="margin-bottom: 20px;">Processing Jobs</h2>
                <div id="jobsList">
                    <div class="empty-state">
                        <div style="font-size: 4em; margin-bottom: 20px;">📹</div>
                        <p>No jobs yet. Upload a video to get started!</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        let pollInterval;

        // File upload handler
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('video', file);

            try {
                const response = await fetch(`${API_URL}/upload`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                
                if (response.ok) {
                    alert(`Upload successful! Job ID: ${data.job_id}`);
                    loadJobs();
                    startPolling();
                } else {
                    alert(`Upload failed: ${data.error}`);
                }
            } catch (error) {
                alert(`Upload error: ${error.message}`);
            }

            // Reset input
            e.target.value = '';
        });

        // Load jobs
        async function loadJobs() {
            try {
                const response = await fetch(`${API_URL}/jobs`);
                const data = await response.json();
                
                renderJobs(data.jobs);
            } catch (error) {
                console.error('Error loading jobs:', error);
            }
        }

        // Render jobs
        function renderJobs(jobs) {
            const container = document.getElementById('jobsList');
            
            if (jobs.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 4em; margin-bottom: 20px;">📹</div>
                        <p>No jobs yet. Upload a video to get started!</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = jobs.map(job => `
                <div class="job-card">
                    <div class="job-header">
                        <div class="job-title">${job.filename}</div>
                        <div class="status-badge status-${job.status}">${job.status.toUpperCase()}</div>
                    </div>
                    
                    ${job.status === 'processing' ? `
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${job.progress}%">
                                ${job.progress}%
                            </div>
                        </div>
                    ` : ''}

                    ${job.status === 'completed' && job.result ? `
                        <div class="metrics">
                            <div class="metric-card">
                                <div class="metric-value">${job.result.metrics.unique_tracks}</div>
                                <div class="metric-label">Tracks</div>
                            </div>
                            <div class="metric-card">
                                <div class="metric-value">${job.result.metrics.total_events}</div>
                                <div class="metric-label">Events</div>
                            </div>
                            <div class="metric-card">
                                <div class="metric-value">${job.result.metrics.average_fps.toFixed(1)}</div>
                                <div class="metric-label">Avg FPS</div>
                            </div>
                            <div class="metric-card">
                                <div class="metric-value">${job.result.metrics.processing_time_seconds.toFixed(1)}s</div>
                                <div class="metric-label">Time</div>
                            </div>
                        </div>

                        <div class="job-actions">
                            <button class="btn btn-primary" onclick="downloadVideo('${job.id}')">
                                📥 Download Video
                            </button>
                            <button class="btn btn-secondary" onclick="viewEvents('${job.id}')">
                                📊 View Events
                            </button>
                        </div>
                    ` : ''}

                    ${job.status === 'failed' ? `
                        <div style="color: #dc3545; margin-top: 10px;">
                            Error: ${job.error}
                        </div>
                    ` : ''}

                    <div style="margin-top: 15px; color: #6c757d; font-size: 0.9em;">
                        Created: ${new Date(job.created_at).toLocaleString()}
                    </div>
                </div>
            `).join('');
        }

        // Download video
        function downloadVideo(jobId) {
            window.open(`${API_URL}/jobs/${jobId}/video`, '_blank');
        }

        // View events
        async function viewEvents(jobId) {
            try {
                const response = await fetch(`${API_URL}/jobs/${jobId}/events`);
                const data = await response.json();
                
                // Open in new window with formatted JSON
                const win = window.open('', '_blank');
                win.document.write('<pre>' + JSON.stringify(data, null, 2) + '</pre>');
            } catch (error) {
                alert('Error loading events: ' + error.message);
            }
        }

        // Start polling for updates
        function startPolling() {
            if (pollInterval) return;
            
            pollInterval = setInterval(loadJobs, 2000); // Poll every 2 seconds
        }

        // Stop polling
        function stopPolling() {
            if (pollInterval) {
                clearInterval(pollInterval);
                pollInterval = null;
            }
        }

        // Initial load
        loadJobs();
        startPolling();
    </script>
</body>
</html>
